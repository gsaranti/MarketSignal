<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dark mode — graphite</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="background:#1B1814; padding: 20px; border: 1px solid #3A342A; border-radius: 2px;">
  <div class="swatch-row" style="--cols: 4;">
    <div class="swatch">
      <div class="swatch-chip" style="background:#1B1814; border-color:#3A342A;"></div>
      <div class="swatch-name" style="color:#B5AC97;">--paper-dk</div>
      <div class="swatch-hex" style="color:#7E7560;">#1B1814</div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#252119; border-color:#3A342A;"></div>
      <div class="swatch-name" style="color:#B5AC97;">--paper-soft-dk</div>
      <div class="swatch-hex" style="color:#7E7560;">#252119</div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#ECE5D2; border-color:#3A342A;"></div>
      <div class="swatch-name" style="color:#B5AC97;">--ink-dk</div>
      <div class="swatch-hex" style="color:#7E7560;">#ECE5D2</div>
    </div>
    <div class="swatch">
      <div class="swatch-chip" style="background:#B0596A; border-color:#3A342A;"></div>
      <div class="swatch-name" style="color:#B5AC97;">--accent-dk</div>
      <div class="swatch-hex" style="color:#7E7560;">#B0596A</div>
    </div>
  </div>
  <div style="margin-top: 12px; font-family: var(--font-serif); color:#ECE5D2; font-style:italic; font-size:13px;">
    Soft graphite, not pure black. The accent is still desaturated.
  </div>
</div>

</div>
</body>
</html>
