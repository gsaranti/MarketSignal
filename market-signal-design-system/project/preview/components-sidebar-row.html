<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sidebar row — states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="border-top: 1px solid var(--hairline-soft); border-bottom: 1px solid var(--hairline-soft);">
  <div class="row">
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div style="font-family: var(--font-sans); font-size: 14px; color: var(--ink); font-weight: 500;">Issue 144 · The Bond Vigilantes Return</div>
      <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Sun · Apr 14</div>
    </div>
    <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-3);">14m</div>
  </div>
  <div class="row" style="background: var(--paper-soft);">
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div style="font-family: var(--font-sans); font-size: 14px; color: var(--ink); font-weight: 500;">Issue 143 · Energy Re-rating, Round Two</div>
      <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Sun · Apr 7 · hover</div>
    </div>
    <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-3);">21m</div>
  </div>
  <div class="row is-current" aria-current="true">
    <div style="display:flex; flex-direction:column; gap:2px;">
      <div style="font-family: var(--font-sans); font-size: 14px; color: var(--ink); font-weight: 600;">Issue 142 · A Quiet Week, Honestly</div>
      <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Sun · Mar 31 · current</div>
    </div>
    <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-3);">9m</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Default · hover (paper-soft) · current (2px accent on leading edge, never a fill).
</div>

</div>
</body>
</html>
