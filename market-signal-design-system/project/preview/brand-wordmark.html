<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:flex; align-items:center; gap: 48px;">
  <div>
    <div style="font-family: var(--font-serif); font-size: 32px; font-weight: 600; letter-spacing: 0; color: var(--ink); line-height: 1;">Market Signal</div>
    <div style="border-top: 1px solid var(--hairline); margin: 8px 0 6px 0; width: 220px;"></div>
    <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3);">A weekly market report</div>
  </div>
  <div style="border-left: 1px solid var(--hairline-soft); padding-left: 32px;">
    <div style="background: var(--ink); padding: 18px 22px;">
      <div style="font-family: var(--font-serif); font-size: 24px; font-weight: 600; letter-spacing: 0; color: var(--paper); line-height: 1;">Market Signal</div>
      <div style="border-top: 1px solid #4A4238; margin: 7px 0 5px 0; width: 170px;"></div>
      <div style="font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #B5AC97;">A weekly market report</div>
    </div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Set in the serif. No symbol, no monogram, no abstract brand shape.
</div>

</div>
</body>
</html>
