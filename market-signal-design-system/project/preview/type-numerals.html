<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Numerals — tabular figures</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
  <div>
    <div class="cap" style="margin-bottom: 8px;">Tabular (used in tables)</div>
    <div style="font-family: var(--font-sans); font-variant-numeric: tabular-nums lining-nums; font-size: 15px; line-height: 1.8; color: var(--ink);">
      <div>4,392.18</div>
      <div>&nbsp;&nbsp;&nbsp;73.46</div>
      <div>&nbsp;&nbsp;1,108.04</div>
    </div>
  </div>
  <div>
    <div class="cap" style="margin-bottom: 8px;">Old-style (in serif prose)</div>
    <div style="font-family: var(--font-serif); font-feature-settings: 'onum'; font-size: 17px; line-height: 1.8; color: var(--ink); letter-spacing: -0.006em;">
      <div>Issued 3,182 reports since 2021</div>
      <div>covering 47 macro themes</div>
    </div>
  </div>
</div>

</div>
</body>
</html>
