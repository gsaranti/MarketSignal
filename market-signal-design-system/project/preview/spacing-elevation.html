<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Elevation — flat with hairlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
  <div>
    <div class="cap" style="margin-bottom: 10px;">In this system</div>
    <div style="padding: 16px; border: 1px solid var(--hairline); border-radius: 2px;">
      <div style="font-family: var(--font-serif); font-size: 15px; color: var(--ink); font-weight: 600;">Figure 1 — DXY vs. 10Y</div>
      <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px;">Source · St. Louis Fed</div>
    </div>
  </div>
  <div>
    <div class="cap" style="margin-bottom: 10px;">Not this</div>
    <div style="padding: 16px; background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);">
      <div style="font-family: var(--font-sans); font-size: 15px; color: var(--ink); font-weight: 600;">Lifted card</div>
      <div style="font-family: var(--font-sans); font-size: 11px; color: var(--ink-3); margin-top: 4px;">with drop shadow</div>
    </div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  No drop shadows. No elevation layers. No z-axis. Differentiation is hairlines and tone.
</div>

</div>
</body>
</html>
