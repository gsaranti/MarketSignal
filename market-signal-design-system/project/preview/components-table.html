<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Watchlist — hairline rules, tabular figures</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="font-family: var(--font-sans); font-size: 13px;">
  <div style="display: grid; grid-template-columns: 1fr max-content max-content max-content; gap: 0; column-gap: 24px;">
    <div class="cap" style="padding-bottom: 6px; border-bottom: 1px solid var(--hairline);">Series</div>
    <div class="cap" style="padding-bottom: 6px; border-bottom: 1px solid var(--hairline); text-align: right;">Last</div>
    <div class="cap" style="padding-bottom: 6px; border-bottom: 1px solid var(--hairline); text-align: right;">Δ wk</div>
    <div class="cap" style="padding-bottom: 6px; border-bottom: 1px solid var(--hairline); text-align: right;">Δ ytd</div>

    
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); color: var(--ink);">S&P 500</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink);">4,392.18</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-family: var(--font-mono); font-size: 12px;">▴ 1.42%</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); font-family: var(--font-mono); font-size: 12px;">+8.1%</div>
    
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); color: var(--ink);">WTI Crude</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink);">73.46</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-family: var(--font-mono); font-size: 12px;">▾ 0.83%</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); font-family: var(--font-mono); font-size: 12px;">+11.2%</div>
    
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); color: var(--ink);">US 10Y Yield</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink);">4.31%</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-family: var(--font-mono); font-size: 12px;">▴ 0.06</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); font-family: var(--font-mono); font-size: 12px;">+0.32</div>
    
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); color: var(--ink);">DXY</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink);">104.27</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-family: var(--font-mono); font-size: 12px;">▴ 0.21%</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); font-family: var(--font-mono); font-size: 12px;">+1.8%</div>
    
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); color: var(--ink);">Gold</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink);">2,318.40</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-family: var(--font-mono); font-size: 12px;">▴ 0.42%</div>
      <div style="padding: 8px 0; border-bottom: 1px solid var(--hairline-soft); text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); font-family: var(--font-mono); font-size: 12px;">+12.4%</div>
    
  </div>
</div>

</div>
</body>
</html>
