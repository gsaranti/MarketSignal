<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Accent — oxblood</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div class="swatch-row" style="--cols: 3;">
  <div class="swatch">
    <div class="swatch-chip" style="background:#6E2230;"></div>
    <div class="swatch-name">--accent</div>
    <div class="swatch-hex">#6E2230 · oxblood</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#581923;"></div>
    <div class="swatch-name">--accent-press</div>
    <div class="swatch-hex">#581923 · pressed</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#8A3744;"></div>
    <div class="swatch-name">--accent-soft</div>
    <div class="swatch-hex">#8A3744 · disabled but visible</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Used only for: primary button fill · focus ring · current sidebar leading edge · one emphasized chart series. Never on icons, never on body prose.
</div>

</div>
</body>
</html>
