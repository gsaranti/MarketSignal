<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Baseline rhythm</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="position: relative; height: 160px; background: linear-gradient(to bottom, var(--paper) 0, var(--paper) 7px, var(--hairline-soft) 7px, var(--hairline-soft) 8px) 0 0 / 100% 8px;">
  <div style="padding: 16px 20px;">
    <div style="font-family: var(--font-serif); font-size: 22px; line-height: 32px; font-weight: 600; color: var(--ink); margin: 0 0 8px 0;">A section heading</div>
    <div style="font-family: var(--font-serif); font-size: 17px; line-height: 24px; letter-spacing: -0.006em; color: var(--ink); max-width: 56ch; margin: 0;">The thesis is unchanged this week. Energy is up 3.2% on the week; the underlying logic still holds, but the timing was wrong.</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  8px baseline grid. Paragraphs and headings snap to it. Whitespace is never decorative.
</div>

</div>
</body>
</html>
