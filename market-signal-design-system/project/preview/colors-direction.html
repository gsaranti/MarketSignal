<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Direction signal — never red/green</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:flex; gap:48px; align-items:flex-start;">
  <div>
    <div class="cap" style="margin-bottom:8px;">In this system</div>
    <div style="font-family: var(--font-mono); font-size: 14px; color: var(--ink); line-height: 1.8;">
      <div><span style="color: var(--ink-2);">▴</span>&nbsp;&nbsp;+1.42%</div>
      <div><span style="color: var(--ink-2);">▾</span>&nbsp;&nbsp;−0.83%</div>
      <div><span style="color: var(--ink-3);">·</span>&nbsp;&nbsp;&nbsp;&nbsp;0.00%</div>
    </div>
  </div>
  <div style="border-left: 1px solid var(--hairline-soft); padding-left: 32px;">
    <div class="cap" style="margin-bottom:8px;">Not this</div>
    <div style="font-family: var(--font-mono); font-size: 14px; line-height: 1.8;">
      <div><span style="color:#16a34a;">▲ +1.42%</span></div>
      <div><span style="color:#dc2626;">▼ −0.83%</span></div>
      <div style="color:#9ca3af;">— 0.00%</div>
    </div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Direction comes from sign, position, weight, and a neutral chevron. The product is not a trading app.
</div>

</div>
</body>
</html>
