<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div class="swatch-row" style="--cols: 3;">
  <div class="swatch">
    <div class="swatch-chip" style="background:#1F1A14;"></div>
    <div class="swatch-name">--ink</div>
    <div class="swatch-hex">#1F1A14 · body</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#4A4238;"></div>
    <div class="swatch-name">--ink-2</div>
    <div class="swatch-hex">#4A4238 · secondary</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#7A6F5F;"></div>
    <div class="swatch-name">--ink-3</div>
    <div class="swatch-hex">#7A6F5F · captions · tertiary</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">Near-black with a touch of brown. Body reads as ink, not pixels.</div>

</div>
</body>
</html>
