<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Status row — long-running job</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="border-top: 1px solid var(--hairline); padding-top: 12px;">
  <div style="display:flex; align-items:center; gap: 14px;">
    <div style="font-family: var(--font-sans); font-size: 13px; color: var(--ink-2); white-space: nowrap;">Generating this week's issue</div>
    <div style="flex: 1; height: 1px; background: var(--hairline-soft); position: relative; overflow: hidden;">
      <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 38%; background: var(--ink);"></div>
    </div>
    <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; color: var(--ink-3); white-space: nowrap;">~24 min</div>
  </div>
  <div class="cap" style="margin-top: 8px; letter-spacing: 0.05em;">Started 06:12 ET · step 4 of 11 · auditing prior call on energy</div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Text and a single 1px bar. No shimmer, no spinner, no celebration when complete.
</div>

</div>
</body>
</html>
