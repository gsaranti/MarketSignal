<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Card — a hairline rectangle</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
  <div style="padding: 16px 18px; border: 1px solid var(--hairline); border-radius: 2px;">
    <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Figure 2</div>
    <div style="font-family: var(--font-serif); font-size: 17px; color: var(--ink); margin-top: 4px;">Real yields vs. equity multiples</div>
    <div style="font-family: var(--font-sans); font-size: 12px; color: var(--ink-3); margin-top: 4px;">FRED · Bloomberg · 2019–2025</div>
  </div>
  <div style="padding: 16px 18px; border: 1px solid var(--hairline); border-radius: 2px;">
    <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Retrospective</div>
    <div style="font-family: var(--font-serif); font-size: 17px; color: var(--ink); margin-top: 4px; line-height: 1.45;">Last month's call on energy looks early.</div>
    <div style="font-family: var(--font-sans); font-size: 12px; color: var(--ink-2); margin-top: 4px;">Issue 140 · graded this week</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  A card is a 1px rectangle on paper. No fill change, no shadow, no rounding above 2px.
</div>

</div>
</body>
</html>
