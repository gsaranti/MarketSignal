<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Paper surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div class="swatch-row" style="--cols: 3;">
  <div class="swatch">
    <div class="swatch-chip" style="background:#F4EFE4;"></div>
    <div class="swatch-name">--paper</div>
    <div class="swatch-hex">#F4EFE4 · primary</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#ECE6D5;"></div>
    <div class="swatch-name">--paper-soft</div>
    <div class="swatch-hex">#ECE6D5 · hover · selected</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#E6DFCC;"></div>
    <div class="swatch-name">--paper-edge</div>
    <div class="swatch-hex">#E6DFCC · inset wells</div>
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">Premium uncoated stock — warm, never blue-white.</div>

</div>
</body>
</html>
