<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 60px 1fr 90px; row-gap: 10px; column-gap: 16px; align-items: baseline;">
  <div class="swatch-hex">32 / 38</div>
  <div style="font-family: var(--font-serif); font-size: 32px; line-height: 1.18; font-weight: 600;">A weekly market report</div>
  <div class="swatch-hex">display</div>

  <div class="swatch-hex">22 / 28</div>
  <div style="font-family: var(--font-serif); font-size: 22px; line-height: 1.3; font-weight: 600;">Section heading</div>
  <div class="swatch-hex">h1</div>

  <div class="swatch-hex">19 / 26</div>
  <div style="font-family: var(--font-serif); font-size: 19px; line-height: 1.36; font-weight: 600;">Subsection heading</div>
  <div class="swatch-hex">h2</div>

  <div class="swatch-hex">17 / 26</div>
  <div style="font-family: var(--font-serif); font-size: 17px; line-height: 1.55; letter-spacing: -0.006em;">Body — the rhythm of a well-set print broadsheet.</div>
  <div class="swatch-hex">body</div>

  <div class="swatch-hex">14 / 20</div>
  <div style="font-family: var(--font-sans); font-size: 14px;">UI chrome · labels · buttons</div>
  <div class="swatch-hex">ui</div>

  <div class="swatch-hex">11 / 16</div>
  <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">Caption — opened tracking only here</div>
  <div class="swatch-hex">caption</div>
</div>

</div>
</body>
</html>
