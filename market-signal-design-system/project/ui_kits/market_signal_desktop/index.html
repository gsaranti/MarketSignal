<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Market Signal — Desktop UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #E6DFCC;        /* one tonal step darker than --paper, to lift the window */
    min-height: 100vh;
    font-family: var(--font-sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root {
    padding: 40px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Sample data -->
  <script src="data.js"></script>

  <!-- Components (order matters — leaf-first) -->
  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Window.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="WarningBar.jsx"></script>
  <script type="text/babel" src="LatestReport.jsx"></script>
  <script type="text/babel" src="ResearchInbox.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
