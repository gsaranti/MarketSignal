<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spacing scale — 8px baseline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px;">
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 2px; height: 2px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">2</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 4px; height: 4px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">4</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 8px; height: 8px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">8</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 12px; height: 12px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">12</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 16px; height: 16px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">16</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 20px; height: 20px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">20</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 24px; height: 24px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">24</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 32px; height: 32px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">32</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 40px; height: 40px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">40</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 56px; height: 56px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">56</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 72px; height: 72px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">72</div>
    </div>
  
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">
      <div style="background: var(--ink); width: 96px; height: 96px; border-radius: 1px;"></div>
      <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);">96</div>
    </div>
  
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  Chrome lives in 4–24. The big numbers are reserved for inter-section breathing in the report body.
</div>

</div>
</body>
</html>
