  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

play: swap;\n  src: url(\"116aaefb-394e-4edb-b675-bb6bc5aad498\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* --- Colors ------------------------------------------------------------- */\n\n  /* Surfaces — warm uncoated stock */\n  --paper:        #F4EFE4;   /* primary surface */\n  --paper-soft:   #ECE6D5;   /* hovered row / selected sidebar bg */\n  --paper-edge:   #E6DFCC;   /* one step down — inset wells */\n\n  /* Ink — warm near-black, never pure #000 */\n  --ink:          #1F1A14;\n  --ink-2:        #4A4238;\n  --ink-3:        #7A6F5F;\n\n  /* Hairlines */\n  --hairline:     #C8BFAE;\n  --hairline-soft:#DCD4C0;\n\n  /* Accent — oxblood / aged burgundy */\n  --accent:       #6E2230;\n  --accent-press: #581923;\n  --accent-soft:  #8A3744;   /* for the rare disabled-but-visible state */\n\n  /* Neutral chevron for direction (never red/green) */\n  --signal-up:    var(--ink);\n  --signal-down:  var(--ink);\n\n  /* --- Analytical register palette ---------------------------------------\n     CONFINED to Portfolio + Trade Opportunities. Never in the report, never\n     in generic chrome. A small DESATURATED palette, unified: the SAME tokens\n     serve directional (up/down/flat), the grade scale (A->F), and conviction.\n     Desaturated to match oxblood's restraint -- it must never read as a\n     trading-app green. All values WCAG AA on their surface (notes below). */\n\n  /* Directional pair + neutral mid (the spine). On --paper:\n     up 6.35:1 · down 9.47:1 · flat 4.93:1 — all AA as text. */\n  --ana-up:      #2E6049;   /* muted pine green — gains / above / top grades */\n  --ana-down:    #6E2230;   /* oxblood (= --accent) — losses / below / low grades */\n  --ana-flat:    #6F6657;   /* neutral warm mid — unchanged / middle grades */\n  --ana-mid:     #6F6657;   /* alias: the neutral spine tone */\n\n  /* Faint directional fills — for the rare small tint behind a value/cell.\n     Just-perceptible against paper; pair with the text tokens above. */\n  --ana-up-fill:   #E2E9DC;\n  --ana-down-fill: #EFDCDA;\n  --ana-flat-fill: #ECE6D5;\n\n  /* Grade scale — five discrete tonal steps across the unified palette\n     (green -> olive -> neutral -> brick -> oxblood). Each `-tx` is AA on its\n     `-bg` tint (5.3–8.2:1 light). Chips are hairline/flat, never glossy. */\n  --grade-a-tx: #2E6049;  --grade-a-bg: #E2E9DC;   /* A — 5.86:1 */\n  --grade-b-tx: #46662F;  --grade-b-bg: #E7E8D7;   /* B — 5.28:1 */\n  --grade-c-tx: #6F6657;  --grade-c-bg: #ECE6D5;   /* C — 4.54:1 */\n  --grade-d-tx: #8A4232;  --grade-d-bg: #EEE0D4;   /* D — 5.59:1 */\n  --grade-f-tx: #6E2230;  --grade-f-bg: #EFDCDA;   /* F — 8.23:1 */\n\n  /* --- Type --------------------------------------------------------------- */\n\n  --font-serif:   \"Source Serif 4\", \"Source Serif Pro\", Georgia, \"Times New Roman\", serif;\n  --font-sans:    \"Public Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Size scale (px) — restrained, no display giants */\n  --t-display:   32px;   /* report title; only used at the top of an issue */\n  --t-display-2: 28px;   /* alternate display size */\n  --t-h1:        22px;   /* section heads inside the report */\n  --t-h2:        19px;\n  --t-h3:        17px;   /* same as body, but bold */\n  --t-body:      17px;   /* report body — generous */\n  --t-prose-sm:  16px;\n  --t-ui:        14px;   /* UI chrome */\n  --t-ui-sm:     13px;\n  --t-caption:   11px;   /* the only place uppercase is allowed */\n\n  --lh-display: 1.18; /* @kind other */\n  --lh-prose:   1.55; /* @kind other */\n  --lh-ui:      1.4;  /* @kind other */\n\n  /* Tracking — tight at body, neutral at UI, opened only at 11px caption */\n  --track-prose:    -0.006em;\n  --track-display:   0em;\n  --track-ui:        0em;\n  --track-caption:   0.05em;\n\n  /* --- Spacing — 8px baseline (chrome uses 4px sub-step) ------------------ */\n  --s-1:   2px;\n  --s-2:   4px;\n  --s-3:   8px;\n  --s-4:  12px;\n  --s-5:  16px;\n  --s-6:  20px;\n  --s-7:  24px;\n  --s-8:  32px;\n  --s-9:  40px;\n  --s-10: 56px;\n  --s-11: 72px;\n  --s-12: 96px;\n\n  /* --- Radii — barely there ---------------------------------------------- */\n  --radius:    2px;\n  --radius-sm: 1px;\n\n  /* --- Borders ----------------------------------------------------------- */\n  --border:        1px solid var(--hairline);\n  --border-soft:   1px solid var(--hairline-soft);\n  --border-accent: 2px solid var(--accent);\n\n  /* --- Motion ------------------------------------------------------------ */\n  --dur-fast:   120ms; /* @kind other */ /* state changes */\n  --dur-arrive: 200ms; /* @kind other */ /* a new report arriving in the sidebar */\n  --ease:       cubic-bezier(0.4, 0.0, 0.2, 1); /* @kind other */\n\n  /* --- Reading column ---------------------------------------------------- */\n  --measure: 64ch;       /* 64–72 characters wide */\n  --measure-wide: 72ch;\n}\n\n/* Dark mode — graphite, not pure black; same desaturated accent, lifted. */\n:root[data-theme=\"dark\"],\n.theme-dark {\n  --paper:        #1B1814;\n  --paper-soft:   #252119;\n  --paper-edge:   #2E281E;\n\n  --ink:          #ECE5D2;\n  --ink-2:        #B5AC97;\n  --ink-3:        #7E7560;\n\n  --hairline:     #3A342A;\n  --hairline-soft:#2C271F;\n\n  --accent:       #B0596A;\n  --accent-press: #C77384;\n  --accent-soft:  #8F4452;\n\n  /* Analytical register — lifted for graphite. Desaturated, never neon.\n     On --paper-dk: up 6.50:1 · down 3.78:1 · flat 5.62:1. The down/oxblood\n     tone matches the system's existing --accent-dk and meets AA at the\n     bold/large sizes the analytical register uses for grades and deltas. */\n  --ana-up:      #6FA98A;   /* lifted sage */\n  --ana-down:    #B0596A;   /* oxblood-dk (= --accent) */\n  --ana-flat:    #9C9078;   /* lifted neutral warm mid */\n  --ana-mid:     #9C9078;\n\n  --ana-up-fill:   #23302A;\n  --ana-down-fill: #2E1F20;\n  --ana-flat-fill: #252119;\n\n  /* Grade scale — dark. `-tx` AA on `-bg` (5.0–5.8:1; F is 3.36:1, AA at the\n     bold/large grade-chip size). */\n  --grade-a-tx: #6FA98A;  --grade-a-bg: #23302A;\n  --grade-b-tx: #93AE73;  --grade-b-bg: #272D20;\n  --grade-c-tx: #A89A82;  --grade-c-bg: #252119;\n  --grade-d-tx: #CB8A6F;  --grade-d-bg: #2E241E;\n  --grade-f-tx: #B0596A;  --grade-f-bg: #2E1F20;\n}\n\n/* =============================================================================\n   Semantic element styles\n   ========================================================================== */\n\nhtml, body {\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-sans);\n  font-size: var(--t-ui);\n  line-height: var(--lh-ui);\n  letter-spacing: var(--track-ui);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- The reading surface ---- */\n.prose {\n  font-family: var(--font-serif);\n  font-size: var(--t-body);\n  line-height: var(--lh-prose);\n  letter-spacing: var(--track-prose);\n  color: var(--ink);\n  max-width: var(--measure-wide);\n  font-feature-settings: \"kern\", \"liga\", \"onum\";\n}\n.prose p { margin: 0 0 16px 0; }\n.prose p + p { text-indent: 0; }              /* paragraphs separated by space, not indent */\n\n.prose h1, .prose h2, .prose h3 {\n  font-family: var(--font-serif);\n  font-weight: 600;\n  letter-spacing: 0;\n  color: var(--ink);\n  margin: 32px 0 12px 0;\n}\n.prose h1 { font-size: var(--t-display-2); line-height: var(--lh-display); }\n.prose h2 { font-size: var(--t-h1); }\n.prose h3 { font-size: var(--t-h2); }\n\n.prose a {\n  color: var(--ink);\n  text-decoration: none;\n  border-bottom: 1px solid var(--hairline);\n  transition: border-color var(--dur-fast) var(--ease);\n}\n.prose a:hover {\n  border-bottom-color: var(--accent);\n}\n\n.prose blockquote {\n  font-style: italic;\n  color: var(--ink-2);\n  margin: 24px 0 24px 0;\n  padding-left: 16px;\n  border-left: 1px solid var(--hairline);\n}\n\n/* Section ornament — a thin rule with a small centered glyph (print convention). */\n.prose hr,\n.section-rule {\n  border: 0;\n  text-align: center;\n  margin: 40px 0;\n  color: var(--ink-3);\n  font-family: var(--font-serif);\n  font-size: 16px;\n  line-height: 1;\n}\n.prose hr::before,\n.section-rule::before {\n  content: \"✻\";\n  display: inline-block;\n  padding: 0 12px;\n  background: var(--paper);\n  position: relative;\n  top: 0.5em;\n}\n.prose hr,\n.section-rule {\n  position: relative;\n}\n.prose hr::after,\n.section-rule::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; top: 50%;\n  border-top: 1px solid var(--hairline);\n  z-index: -1;\n}\n\n/* Inline figure/table figure caption */\n.prose figcaption,\n.figure-caption {\n  font-family: var(--font-sans);\n  font-size: var(--t-caption);\n  letter-spacing: var(--track-caption);\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-top: 8px;\n}\n\n/* ---- Display moments — report title + date line ---- */\n.report-title {\n  font-family: var(--font-serif);\n  font-size: var(--t-display);\n  line-height: var(--lh-display);\n  font-weight: 600;\n  letter-spacing: 0;\n  color: var(--ink);\n  margin: 0 0 4px 0;\n}\n.report-dateline {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: 15px;\n  color: var(--ink-3);\n  margin: 0 0 32px 0;\n}\n\n/* ---- UI chrome basics ---- */\n/* Only the .label class applies the caption-uppercase styling — the bare\n   `label` element is left alone so it can wrap clickable controls (like\n   the rows in RadioGroup) without forcing their inner text to uppercase. */\n.label {\n  display: block;\n  font-family: var(--font-sans);\n  font-size: var(--t-caption);\n  letter-spacing: var(--track-caption);\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-bottom: 6px;\n}\n\n.caption {\n  font-family: var(--font-sans);\n  font-size: var(--t-caption);\n  letter-spacing: var(--track-caption);\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\n/* Tabular numerals everywhere figures appear in columns */\n.tabular, .num {\n  font-variant-numeric: tabular-nums lining-nums;\n  font-feature-settings: \"tnum\", \"lnum\";\n}\n\n/* ---- Buttons — rectangular, 2px radius, no shadow ---- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 6px;\n  font-family: var(--font-sans);\n  font-size: var(--t-ui);\n  font-weight: 500;\n  line-height: 1;\n  letter-spacing: 0;\n  padding: 9px 14px;\n  border-radius: var(--radius);\n  border: 1px solid transparent;\n  cursor: pointer;\n  background: transparent;\n  color: var(--ink);\n  transition: background-color var(--dur-fast) var(--ease),\n              border-color    var(--dur-fast) var(--ease),\n              color           var(--dur-fast) var(--ease);\n}\n.btn-primary {\n  background: var(--ink);\n  color: var(--paper);\n  border-color: var(--ink);\n}\n.btn-primary:hover  { background: #2B241B; border-color: #2B241B; }\n.btn-primary:active { background: #100C08; border-color: #100C08; }\n\n.btn-secondary {\n  background: transparent;\n  color: var(--ink);\n  border: 1px solid var(--ink);\n}\n.btn-secondary:hover  { background: var(--paper-soft); }\n.btn-secondary:active { background: var(--paper-edge); }\n\n.btn-ghost {\n  background: transparent;\n  color: var(--ink-2);\n  border: 1px solid transparent;\n}\n.btn-ghost:hover  { color: var(--ink); background: var(--paper-soft); }\n\n.btn:focus-visible {\n  outline: 2px solid var(--accent);\n  outline-offset: 1px;\n}\n\n/* ---- Inputs — open, single bottom border ---- */\n.input {\n  display: block;\n  width: 100%;\n  font-family: var(--font-sans);\n  font-size: var(--t-ui);\n  color: var(--ink);\n  background: transparent;\n  border: 0;\n  border-bottom: 1px solid var(--ink);\n  padding: 8px 0;\n  transition: border-color var(--dur-fast) var(--ease);\n}\n.input:focus {\n  outline: none;\n  border-bottom-color: var(--accent);\n  border-bottom-width: 1px;\n  box-shadow: 0 1px 0 0 var(--accent); /* a hairline doubler so focus is unambiguous */\n}\n.input::placeholder { color: var(--ink-3); }\n\n/* ---- Cards — hairline rectangles. No fill change, no shadow. ---- */\n.card {\n  background: var(--paper);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n  padding: 20px;\n}\n\n/* ---- Sidebar row — current item shows a 2px accent leading edge ---- */\n.row {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  gap: 12px;\n  padding: 8px 12px 8px 14px;\n  border-left: 2px solid transparent;\n  border-bottom: 1px solid var(--hairline-soft);\n  cursor: pointer;\n  transition: background-color var(--dur-fast) var(--ease);\n}\n.row:hover           { background: var(--paper-soft); }\n.row[aria-current=\"true\"],\n.row.is-current      {\n  background: var(--paper-soft);\n  border-left-color: var(--accent);\n}\n\n/* ---- Hairline horizontal rule (table / list separator) ---- */\n.hr {\n  border: 0;\n  border-top: 1px solid var(--hairline);\n  margin: 0;\n}\n\n/* ---- Link in chrome ---- */\na.chrome-link {\n  color: var(--ink);\n  text-decoration: none;\n  transition: color var(--dur-fast) var(--ease);\n}\na.chrome-link:hover { text-decoration: underline; text-underline-offset: 2px; }\n\n/* ---- Status row — the long-running-job indicator ---- */\n.status {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-sans);\n  font-size: var(--t-ui-sm);\n  color: var(--ink-2);\n  padding: 8px 0;\n  border-top: 1px solid var(--hairline);\n}\n.status-bar {\n  flex: 1;\n  height: 1px;\n  background: var(--hairline);\n  position: relative;\n  overflow: hidden;\n}\n.status-bar::after {\n  content: \"\";\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: var(--progress, 30%);\n  background: var(--ink);\n}\n\n/* ---- Direction chevrons for tabular data — neutral, never red/green ---- */\n.dir-up::before   { content: \"▴\"; margin-right: 4px; color: var(--ink-2); }\n.dir-down::before { content: \"▾\"; margin-right: 4px; color: var(--ink-2); }\n.dir-flat::before { content: \"·\"; margin-right: 4px; color: var(--ink-3); }\n\n/* ---- Print + selection ---- */\n::selection { background: var(--accent); color: var(--paper); }\n\n/* ---- Reset normalizations the system relies on ---- */\n* { box-sizing: border-box; }\nbutton, input, textarea, select { font: inherit; color: inherit; }\n\n/* =============================================================================\n   Analytical register — Portfolio Analysis & Trade Opportunities only\n   -----------------------------------------------------------------------------\n   Denser than the report. Mono numerics first-class. Hairline data grids,\n   tracked-caps labels, the desaturated palette above. Still flat with\n   hairlines: no shadow, no pill, no radius > 2px, no celebratory framing.\n   These classes never apply to the report (it stays monochrome + serif).\n   ========================================================================== */\n\n/* Tracked-caps column / section header — 11px, +0.05em, Public Sans. */\n.ana-head {\n  font-family: var(--font-sans);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\n/* Mono tabular figure — the analytical register's default numeric face. */\n.ana-num {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums lining-nums;\n  font-feature-settings: \"tnum\", \"lnum\";\n  letter-spacing: -0.01em;\n}\n\n/* Ticker — mono, lightly tracked, reads instrument-grade. */\n.ana-ticker {\n  font-family: var(--font-mono);\n  font-weight: 500;\n  letter-spacing: 0.02em;\n  color: var(--ink);\n}\n\n/* ---- Directional value token (4b) — sign + weight + chevron + hue ---- */\n.dir {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums lining-nums;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  display: inline-flex;\n  align-items: baseline;\n  gap: 4px;\n}\n.dir::before { font-weight: 500; }\n.dir.up    { color: var(--ana-up); }\n.dir.up::before   { content: \"▴\"; }\n.dir.down  { color: var(--ana-down); }\n.dir.down::before { content: \"▾\"; }\n.dir.flat  { color: var(--ana-flat); }\n.dir.flat::before { content: \"·\"; }\n\n/* ---- Grade chip (4d) — hairline/flat, never a glossy badge ---- */\n.grade {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  min-width: 26px;\n  height: 22px;\n  padding: 0 6px;\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 14px;\n  line-height: 1;\n  letter-spacing: 0;\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n}\n.grade.a { color: var(--grade-a-tx); background: var(--grade-a-bg); }\n.grade.b { color: var(--grade-b-tx); background: var(--grade-b-bg); }\n.grade.c { color: var(--grade-c-tx); background: var(--grade-c-bg); }\n.grade.d { color: var(--grade-d-tx); background: var(--grade-d-bg); }\n.grade.f { color: var(--grade-f-tx); background: var(--grade-f-bg); }\n\n/* ---- Key-figure strip (5.1) — hairline-delimited label-over-value row ---- */\n.keyfig {\n  display: grid;\n  grid-auto-flow: column;\n  grid-auto-columns: 1fr;\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n  background: var(--paper);\n}\n.keyfig > .kf {\n  padding: 10px 14px;\n  border-left: 1px solid var(--hairline-soft);\n}\n.keyfig > .kf:first-child { border-left: 0; }\n.kf .kf-label {\n  font-family: var(--font-sans);\n  font-size: 10px;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-bottom: 5px;\n  white-space: nowrap;\n}\n.kf .kf-value {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums lining-nums;\n  font-size: 16px;\n  color: var(--ink);\n  letter-spacing: -0.01em;\n}\n\n/* ---- Dense data grid (5.3) — the most \"terminal\" surface ---- */\n.ana-grid {\n  width: 100%;\n  border-collapse: collapse;\n  font-family: var(--font-sans);\n}\n.ana-grid th {\n  font-family: var(--font-sans);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  text-align: left;\n  padding: 7px 12px;\n  border-bottom: 1px solid var(--hairline);\n  white-space: nowrap;\n}\n.ana-grid th.num, .ana-grid td.num {\n  text-align: right;\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums lining-nums;\n}\n.ana-grid td {\n  font-size: 12px;\n  color: var(--ink);\n  padding: 6px 12px;\n  border-bottom: 1px solid var(--hairline-soft);\n}\n.ana-grid tr:last-child td { border-bottom: 0; }\n.ana-grid th.sortable { cursor: pointer; }\n.ana-grid th.sortable::after { content: \" ▾\"; color: var(--ink-3); opacity: 0.5; }\n.ana-grid th.sorted-desc::after { content: \" ▾\"; opacity: 1; }\n.ana-grid th.sorted-asc::after  { content: \" ▴\"; opacity: 1; }\n\n/* ---- Controlled-rich data / holding card (4c) — flat hairline rectangle ---- */\n.ana-card {\n  background: var(--paper);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n}\n\n/* ---- Conviction meter (5.7) — flat hairline scale, no fill theatrics ---- */\n.conviction {\n  display: inline-flex;\n  gap: 3px;\n  align-items: center;\n}\n.conviction i {\n  width: 14px;\n  height: 6px;\n  border: 1px solid var(--hairline);\n  border-radius: 1px;\n  background: transparent;\n  display: block;\n}\n.conviction i.on { background: var(--ink-2); border-color: var(--ink-2); }\n\n/* ---- Methodology affordance (5.6) — restrained reveal, not a tooltip toy ---- */\n.methodology {\n  font-family: var(--font-sans);\n  font-size: 11px;\n  letter-spacing: 0.02em;\n  color: var(--ink-3);\n  border-bottom: 1px dotted var(--hairline);\n  cursor: help;\n}\n\n/* ---- Sort bar — card-surface control for the Portfolio holdings card stack.\n   A horizontal toolbar of toggle TRIGGERS, one per sort key, that reorders the\n   cards. It is NOT a table: each trigger is a <button> (aria-pressed marks the\n   active key); it must NEVER carry aria-sort (that is reserved for .ana-grid\n   heads). The active key shows the EXACT ▾ (desc) / ▴ (asc) glyph .ana-grid\n   th.sortable and .dir already use; inactive keys show a dimmed ▾ at the same\n   0.5 opacity th.sortable::after uses. Clicking the active key flips direction.\n   Reuses existing tokens only — no new color, no pill, radius ≤ 2px. ---- */\n.ana-sortbar {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n  flex-wrap: wrap;\n}\n.ana-sortbar > .ana-sortbar-label {\n  font-family: var(--font-sans);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-right: 8px;\n}\n.ana-sortbar > button {\n  display: inline-flex;\n  align-items: baseline;\n  gap: 5px;\n  font-family: var(--font-sans);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  background: transparent;\n  border: 1px solid transparent;\n  border-radius: var(--radius);\n  padding: 5px 8px;\n  cursor: pointer;\n  transition: background-color var(--dur-fast) var(--ease),\n              color           var(--dur-fast) var(--ease),\n              border-color    var(--dur-fast) var(--ease);\n}\n/* Direction glyph — same vocabulary as th.sortable::after; dimmed when inactive. */\n.ana-sortbar > button::after {\n  content: \"▾\";\n  font-family: var(--font-mono);\n  letter-spacing: 0;\n  opacity: 0.5;\n}\n.ana-sortbar > button:hover {\n  color: var(--ink-2);\n  background: var(--paper-soft);\n}\n.ana-sortbar > button[aria-pressed=\"true\"] {\n  color: var(--ink);\n  background: var(--paper-soft);\n  border-color: var(--hairline);\n}\n.ana-sortbar > button[aria-pressed=\"true\"]::after { opacity: 1; }\n.ana-sortbar > button[aria-pressed=\"true\"][data-dir=\"asc\"]::after  { content: \"▴\"; }\n.ana-sortbar > button[aria-pressed=\"true\"][data-dir=\"desc\"]::after { content: \"▾\"; }\n.ana-sortbar > button:focus-visible {\n  outline: 2px solid var(--accent);\n  outline-offset: 1px;\n}\n\n/* ---- Matrix / list view toggle — for Trade Opportunities. A minimal\n   two-option switch flipping a surface between a card matrix and a flat list.\n   Ghost-text built on the .btn-ghost posture, tracked-caps options, the active\n   one marked via aria-pressed. Segmented WITHOUT a capsule: hairline-divided,\n   radius ≤ 2px — never a pill. Restrained, not a tab bar. Existing tokens\n   only. ---- */\n.ana-viewtoggle {\n  display: inline-flex;\n  align-items: stretch;\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n  overflow: hidden;\n}\n.ana-viewtoggle > button {\n  font-family: var(--font-sans);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  background: transparent;\n  border: 0;\n  border-left: 1px solid var(--hairline);\n  padding: 6px 12px;\n  cursor: pointer;\n  transition: background-color var(--dur-fast) var(--ease),\n              color           var(--dur-fast) var(--ease);\n}\n.ana-viewtoggle > button:first-child { border-left: 0; }\n.ana-viewtoggle > button:hover {\n  color: var(--ink-2);\n  background: var(--paper-soft);\n}\n.ana-viewtoggle > button[aria-pressed=\"true\"] {\n  color: var(--ink);\n  background: var(--paper-soft);\n}\n.ana-viewtoggle > button:focus-visible {\n  outline: 2px solid var(--accent);\n  outline-offset: -2px;\n}\n<\u002Fstyle>\n<style>\n  /* =========================================================================\n     Confirmation dialog — generic chrome (not analytical register).\n     A small blocking confirmation for destructive / irreversible actions.\n     Flat hairline panel on paper — NO shadow. Separation is the scrim only.\n     --------------------------------------------------------------------- */\n\n  /* Scrim token — a FLAT dimming veil, never a frost. See rationale in the\n     preview. Warm near-black ink; tuned per theme so the paper panel always\n     separates from the (also paper-toned) page behind it. No backdrop-filter. */\n  :root { --scrim: rgba(20, 17, 13, 0.55); }\n  :root[data-theme=\"dark\"], .theme-dark { --scrim: rgba(8, 7, 5, 0.64); }\n\n  .dialog-scrim {\n    position: fixed;\n    inset: 0;\n    z-index: 1000;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 24px;\n    background: var(--scrim);            /* flat tint — no blur, no gradient */\n    animation: dlg-fade var(--dur-fast, 120ms) var(--ease, ease-out);\n  }\n  @keyframes dlg-fade { from { opacity: 0; } to { opacity: 1; } }\n\n  .dialog {\n    display: flex;\n    flex-direction: column;\n    width: 100%;\n    max-width: 56ch;\n    max-height: min(80vh, 560px);\n    background: var(--paper);\n    border: 1px solid var(--hairline);\n    border-radius: var(--radius);       /* 2px */\n    /* NO shadow — the scrim does the separating */\n  }\n  .dialog-title {\n    flex: 0 0 auto;\n    margin: 0;\n    padding: 22px 24px 0;\n    font-family: var(--font-serif);\n    font-size: var(--t-h2);             /* 19px, sentence case */\n    font-weight: 600;\n    letter-spacing: 0;\n    color: var(--ink);\n  }\n  .dialog-body {\n    flex: 1 1 auto;\n    overflow-y: auto;                    /* body scrolls; title + actions fixed */\n    padding: 12px 24px 20px;\n    font-family: var(--font-serif);\n    font-size: var(--t-prose-sm);        /* 16px */\n    line-height: var(--lh-prose);\n    letter-spacing: var(--track-prose);\n    color: var(--ink-2);\n  }\n  .dialog-body p { margin: 0 0 14px; }\n  .dialog-body p:last-child { margin-bottom: 0; }\n  .dialog-body strong { color: var(--ink); font-weight: 600; }\n  .dialog-actions {\n    flex: 0 0 auto;\n    display: flex;\n    align-items: center;\n    justify-content: flex-end;\n    gap: 8px;\n    padding: 16px 24px;\n    border-top: 1px solid var(--hairline);\n  }\n  /* Undecorated status line — sits at the left of the actions row in busy. */\n  .dialog-status {\n    margin-right: auto;\n    font-family: var(--font-sans);\n    font-size: var(--t-ui-sm);\n    letter-spacing: 0;\n    color: var(--ink-3);\n  }\n  .dialog .btn:disabled {\n    opacity: 0.45;\n    cursor: default;\n    pointer-events: none;\n  }\n\n  /* ---- preview-only chrome (illustrative frames) ---- */\n  .msn-frame {\n    position: relative;\n    height: 404px;\n    border: 1px solid var(--hairline);\n    border-radius: var(--radius);\n    background: var(--paper);\n    overflow: hidden;\n  }\n  .msn-frame.tall { height: 404px; }\n  .msn-frame .dialog-scrim { position: absolute; padding: 16px; animation: none; }\n  .msn-frame .dialog { max-height: calc(100% - 32px); }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:var(--paper); color:var(--ink); font-family:var(--font-sans);\">\n<div style=\"max-width:1160px; margin:0 auto; padding:40px 40px 88px;\">\n\n  <!-- ===== masthead ===== -->\n  <div style=\"border-bottom:1px solid var(--hairline); padding-bottom:20px; margin-bottom:32px;\">\n    <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Components · generic chrome<\u002Fdiv>\n    <h1 style=\"font-family:var(--font-serif); font-size:32px; font-weight:600; letter-spacing:0; color:var(--ink); margin:8px 0 6px;\">Confirmation dialog<\u002Fh1>\n    <p style=\"font-family:var(--font-serif); font-size:16px; line-height:1.55; letter-spacing:-0.006em; color:var(--ink-2); max-width:64ch; margin:0;\">A small, blocking confirmation for destructive or irreversible actions. Not a general-purpose modal shell — one title, one body, two actions. Usable on any surface; the destructive weight is carried by explicit words, never by a danger color or icon.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ===== live demo ===== -->\n  <div style=\"margin-bottom:40px;\">\n    <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px;\">Live — Settings › Data › Import archive<\u002Fdiv>\n    <div style=\"border:1px solid var(--hairline); border-radius:var(--radius); padding:24px 26px;\">\n      <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Data<\u002Fdiv>\n      <p style=\"font-family:var(--font-serif); font-size:16px; line-height:1.55; letter-spacing:-0.006em; color:var(--ink-2); max-width:60ch; margin:0 0 16px;\">Export the whole corpus to a single archive, or restore from a backup. Importing into a non-empty store replaces everything.<\u002Fp>\n      <div style=\"display:flex; gap:10px;\">\n        <button class=\"btn btn-secondary\">Export archive…<\u002Fbutton>\n        <button class=\"btn btn-secondary\" onclick=\"{{ openDialog }}\">Import archive…<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:var(--font-serif); font-style:italic; font-size:14px; color:var(--ink-3); margin:12px 0 0;\">Open the dialog, then try Escape, a click on the scrim, or “Replace and import” to watch the busy state. Initial focus lands on Cancel.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- the real, fixed modal -->\n  <sc-if value=\"{{ open }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"dialog-scrim\" style=\"{{ scrimStyle }}\" onclick=\"{{ scrimClick }}\">\n      <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"cd-live-title\" aria-describedby=\"cd-live-body\">\n        <h2 class=\"dialog-title\" id=\"cd-live-title\">{{ title }}<\u002Fh2>\n        <div class=\"dialog-body\" id=\"cd-live-body\">\n          <p>{{ body }}<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"dialog-actions\">\n          <sc-if value=\"{{ busy }}\" hint-placeholder-val=\"{{ false }}\">\n            <span class=\"dialog-status\">{{ confirmStatus }}<\u002Fspan>\n          <\u002Fsc-if>\n          <button class=\"btn btn-secondary\" autofocus=\"{{ true }}\" ref=\"{{ cancelRef }}\" onclick=\"{{ cancel }}\" disabled=\"{{ busy }}\">{{ cancelLabel }}<\u002Fbutton>\n          <button class=\"btn btn-primary\" onclick=\"{{ confirm }}\" disabled=\"{{ busy }}\">{{ confirmLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== states × themes ===== -->\n  <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:6px;\">States<\u002Fdiv>\n  <p style=\"font-family:var(--font-serif); font-size:14px; color:var(--ink-3); font-style:italic; margin:0 0 20px;\">Default · busy · long-body overflow — shown light (top) and dark (bottom).<\u002Fp>\n\n  <!-- LIGHT ROW -->\n  <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:22px; margin-bottom:26px;\">\n\n    <!-- default -->\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Default · light<\u002Fdiv>\n      <div class=\"msn-frame\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"s1t\" aria-describedby=\"s1b\">\n            <h2 class=\"dialog-title\" id=\"s1t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"s1b\"><p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp><\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <button class=\"btn btn-secondary\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- busy -->\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Busy · light<\u002Fdiv>\n      <div class=\"msn-frame\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"s2t\" aria-describedby=\"s2b\" aria-busy=\"true\">\n            <h2 class=\"dialog-title\" id=\"s2t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"s2b\"><p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp><\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <span class=\"dialog-status\">Replacing all analytical data. This may take a moment.<\u002Fspan>\n              <button class=\"btn btn-secondary\" disabled=\"\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\" disabled=\"\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- long body -->\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Long body · light<\u002Fdiv>\n      <div class=\"msn-frame tall\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"s3t\" aria-describedby=\"s3b\" style=\"max-height:calc(100% - 32px);\">\n            <h2 class=\"dialog-title\" id=\"s3t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"s3b\">\n              <p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs.<\u002Fp>\n              <p>Every Sunday issue currently on this machine, together with its retrospective audits and the theses that carried across weeks, is overwritten by the archive's contents. Portfolio runs — holdings, grades, conviction, price targets, and the standing per-holding thesis — are replaced in full.<\u002Fp>\n              <p>Trade Opportunities runs, including the calibration scorecard and the since-flagged performance reads, are replaced as well. Your research inbox and any filed PDFs are not part of an analytical archive and are left in place.<\u002Fp>\n              <p>Your API keys and model settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <button class=\"btn btn-secondary\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DARK ROW -->\n  <div class=\"theme-dark\" style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:22px;\">\n\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Default · dark<\u002Fdiv>\n      <div class=\"msn-frame\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"d1t\" aria-describedby=\"d1b\">\n            <h2 class=\"dialog-title\" id=\"d1t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"d1b\"><p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp><\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <button class=\"btn btn-secondary\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Busy · dark<\u002Fdiv>\n      <div class=\"msn-frame\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"d2t\" aria-describedby=\"d2b\" aria-busy=\"true\">\n            <h2 class=\"dialog-title\" id=\"d2t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"d2b\"><p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp><\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <span class=\"dialog-status\">Replacing all analytical data. This may take a moment.<\u002Fspan>\n              <button class=\"btn btn-secondary\" disabled=\"\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\" disabled=\"\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px;\">Long body · dark<\u002Fdiv>\n      <div class=\"msn-frame tall\">\n        <div style=\"position:absolute; inset:0; padding:16px 18px;\">\n          <div style=\"font-family:var(--font-sans); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3);\">Settings · Data<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dialog-scrim\">\n          <div class=\"dialog\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"d3t\" aria-describedby=\"d3b\" style=\"max-height:calc(100% - 32px);\">\n            <h2 class=\"dialog-title\" id=\"d3t\">Replace all analytical data?<\u002Fh2>\n            <div class=\"dialog-body\" id=\"d3b\">\n              <p>Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs.<\u002Fp>\n              <p>Every Sunday issue currently on this machine, together with its retrospective audits and the theses that carried across weeks, is overwritten by the archive's contents. Portfolio runs — holdings, grades, conviction, price targets, and the standing per-holding thesis — are replaced in full.<\u002Fp>\n              <p>Trade Opportunities runs, including the calibration scorecard and the since-flagged performance reads, are replaced as well. Your research inbox and any filed PDFs are left in place.<\u002Fp>\n              <p>Your API keys and model settings are untouched. <strong>This cannot be undone.<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n            <div class=\"dialog-actions\">\n              <button class=\"btn btn-secondary\">Cancel<\u002Fbutton>\n              <button class=\"btn btn-primary\">Replace and import<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== notes ===== -->\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:48px;\">\n\n    <!-- scrim rationale -->\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px;\">The scrim — a decision<\u002Fdiv>\n      <div style=\"font-family:var(--font-serif); font-size:15px; line-height:1.6; letter-spacing:-0.006em; color:var(--ink-2); max-width:60ch;\">\n        <p style=\"margin:0 0 12px;\">The panel is a flat hairline rectangle with no shadow, so every bit of separation from the page comes from the scrim. The system rejects glass, frost, and blur — but those are <em>surface<\u002Fem> treatments: a panel you see through decoratively.<\u002Fp>\n        <p style=\"margin:0 0 12px;\">A modal scrim is a different object — a <strong>flat dimming veil<\u002Fstrong>, the digital equivalent of laying a sheet of dark tissue over the page. So the scrim is a plain warm-ink tint at <code style=\"font-family:var(--font-mono); font-size:13px;\">rgba(20,17,13,.55)<\u002Fcode> light / <code style=\"font-family:var(--font-mono); font-size:13px;\">rgba(8,7,5,.64)<\u002Fcode> dark. No <code style=\"font-family:var(--font-mono); font-size:13px;\">backdrop-filter<\u002Fcode>, no gradient, no texture.<\u002Fp>\n        <p style=\"margin:0;\">Both tokens are warm near-black, not neutral — they belong to the ink family. Dark mode goes one step heavier because the page is already graphite and the paper-toned panel needs the extra contrast to lift off it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- a11y -->\n    <div>\n      <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px;\">Accessibility contract<\u002Fdiv>\n      <div style=\"font-family:var(--font-serif); font-size:15px; line-height:1.7; letter-spacing:-0.006em; color:var(--ink-2); max-width:56ch;\">\n        <div style=\"display:grid; grid-template-columns:max-content 1fr; column-gap:16px; row-gap:8px; font-family:var(--font-sans); font-size:13px; color:var(--ink-2);\">\n          <div style=\"color:var(--ink-3);\">role<\u002Fdiv><div><code style=\"font-family:var(--font-mono); font-size:12px;\">dialog<\u002Fcode>, <code style=\"font-family:var(--font-mono); font-size:12px;\">aria-modal=\"true\"<\u002Fcode><\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">labelled<\u002Fdiv><div><code style=\"font-family:var(--font-mono); font-size:12px;\">aria-labelledby<\u002Fcode> → title<\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">described<\u002Fdiv><div><code style=\"font-family:var(--font-mono); font-size:12px;\">aria-describedby<\u002Fcode> → body<\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">focus<\u002Fdiv><div>lands on Cancel (the safe action)<\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">Escape<\u002Fdiv><div>= Cancel (disabled while busy)<\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">scrim click<\u002Fdiv><div>= Cancel (disabled while busy)<\u002Fdiv>\n          <div style=\"color:var(--ink-3);\">busy<\u002Fdiv><div><code style=\"font-family:var(--font-mono); font-size:12px;\">aria-busy=\"true\"<\u002Fcode>, actions disabled<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== API + CSS ===== -->\n  <div style=\"margin-top:48px;\">\n    <div style=\"font-family:var(--font-sans); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px;\">ConfirmDialog · component<\u002Fdiv>\n    <div style=\"font-family:var(--font-serif); font-size:15px; line-height:1.6; letter-spacing:-0.006em; color:var(--ink-2); max-width:64ch; margin-bottom:16px;\">\n      <p style=\"margin:0 0 4px;\"><code style=\"font-family:var(--font-mono); font-size:13px;\">&lt;ConfirmDialog open title body confirmLabel cancelLabel busy onConfirm onCancel /&gt;<\u002Fcode><\u002Fp>\n      <p style=\"margin:8px 0 0; color:var(--ink-3);\">Renders nothing when <code style=\"font-family:var(--font-mono); font-size:13px;\">open<\u002Fcode> is false. The parent owns <code style=\"font-family:var(--font-mono); font-size:13px;\">busy<\u002Fcode>: set it true in <code style=\"font-family:var(--font-mono); font-size:13px;\">onConfirm<\u002Fcode>, clear it when the action settles. Appearance is a 120ms fade; dismissal is a hard cut.<\u002Fp>\n    <\u002Fdiv>\n    <pre style=\"font-family:var(--font-mono); font-size:12px; line-height:1.6; color:var(--ink-2); background:var(--paper-edge); border:1px solid var(--hairline); border-radius:var(--radius); padding:16px 18px; overflow:auto; margin:0;\">/* Add to colors_and_type.css */\n:root                       { --scrim: rgba(20,17,13,.55); }\n:root[data-theme=\"dark\"],\n.theme-dark                 { --scrim: rgba(8,7,5,.64); }\n\n.dialog-scrim { position:fixed; inset:0; z-index:1000;\n  display:flex; align-items:center; justify-content:center;\n  padding:24px; background:var(--scrim);\n  animation:dlg-fade var(--dur-fast) var(--ease); }   /* no blur */\n@keyframes dlg-fade { from { opacity:0 } to { opacity:1 } }\n\n.dialog { display:flex; flex-direction:column; width:100%;\n  max-width:56ch; max-height:min(80vh,560px);\n  background:var(--paper); border:1px solid var(--hairline);\n  border-radius:var(--radius); }                       /* no shadow */\n\n.dialog-title { flex:0 0 auto; margin:0; padding:22px 24px 0;\n  font-family:var(--font-serif); font-size:var(--t-h2);\n  font-weight:600; letter-spacing:0; color:var(--ink); }\n\n.dialog-body { flex:1 1 auto; overflow-y:auto; padding:12px 24px 20px;\n  font-family:var(--font-serif); font-size:var(--t-prose-sm);\n  line-height:var(--lh-prose); letter-spacing:var(--track-prose);\n  color:var(--ink-2); }                                /* body scrolls */\n\n.dialog-actions { flex:0 0 auto; display:flex; align-items:center;\n  justify-content:flex-end; gap:8px; padding:16px 24px;\n  border-top:1px solid var(--hairline); }              /* title + actions fixed */\n\n.dialog-status { margin-right:auto; font-family:var(--font-sans);\n  font-size:var(--t-ui-sm); color:var(--ink-3); }      /* undecorated */\n.dialog .btn:disabled { opacity:.45; cursor:default; pointer-events:none; }<\u002Fpre>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1160,&quot;height&quot;:900},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Replace all analytical data?&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;body&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. This cannot be undone.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;confirmLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Replace and import&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;cancelLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Cancel&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;scrimStrength&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.55,&quot;min&quot;:0.2,&quot;max&quot;:0.8,&quot;step&quot;:0.01,&quot;unit&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Scrim&quot;}}\">\nclass Component extends DCLogic {\n  state = { open: false, busy: false };\n  cancelRef = React.createRef();\n\n  componentDidMount() {\n    this._onKey = (e) => {\n      if (e.key === \"Escape\" && this.state.open && !this.state.busy) {\n        e.preventDefault();\n        this.cancel();\n      }\n    };\n    document.addEventListener(\"keydown\", this._onKey);\n  }\n  componentWillUnmount() {\n    document.removeEventListener(\"keydown\", this._onKey);\n    if (this._t) clearTimeout(this._t);\n  }\n  componentDidUpdate(_prevProps, prevState) {\n    if (this.state.open && !prevState.open) {\n      setTimeout(() => {\n        try {\n          const scrim = [...document.querySelectorAll(\".dialog-scrim\")]\n            .find(s => getComputedStyle(s).position === \"fixed\");\n          const cancel = scrim && [...scrim.querySelectorAll(\"button\")].find(b => !b.disabled);\n          if (cancel) cancel.focus();\n          else if (this.cancelRef.current) this.cancelRef.current.focus();\n        } catch (e) {}\n      }, 20);\n    }\n  }\n\n  focusCancel = () => {\n    const scrim = [...document.querySelectorAll(\".dialog-scrim\")]\n      .find(s => getComputedStyle(s).position === \"fixed\");\n    const cancel = scrim && [...scrim.querySelectorAll(\"button\")].find(b => !b.disabled);\n    if (cancel) cancel.focus();\n  };\n  openDialog = () => {\n    this.setState({ open: true, busy: false });\n    requestAnimationFrame(() => this.focusCancel());\n    setTimeout(() => this.focusCancel(), 60);\n  };\n  cancel = () => { if (this.state.busy) return; this.setState({ open: false, busy: false }); };\n  confirm = () => {\n    if (this.state.busy) return;\n    this.setState({ busy: true });\n    this._t = setTimeout(() => this.setState({ open: false, busy: false }), 2600);\n  };\n  scrimClick = (e) => { if (e.target === e.currentTarget) this.cancel(); };\n\n  renderVals() {\n    const p = this.props || {};\n    const s = (p.scrimStrength != null) ? p.scrimStrength : 0.55;\n    return {\n      open: this.state.open,\n      busy: this.state.busy,\n      title: p.title ?? \"Replace all analytical data?\",\n      body: p.body ?? \"Importing this archive replaces all existing reports, learnings, snapshots, and portfolio runs. Your API keys and settings are untouched. This cannot be undone.\",\n      confirmLabel: p.confirmLabel ?? \"Replace and import\",\n      cancelLabel: p.cancelLabel ?? \"Cancel\",\n      confirmStatus: \"Replacing all analytical data. This may take a moment.\",\n      scrimStyle: { background: `rgba(20, 17, 13, ${s})` },\n      openDialog: this.openDialog,\n      cancel: this.cancel,\n      confirm: this.confirm,\n      scrimClick: this.scrimClick,\n      cancelRef: this.cancelRef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
