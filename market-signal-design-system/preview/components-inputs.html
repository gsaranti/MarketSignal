<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inputs — open, single bottom rule</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px;">
  <div>
    <label class="label">API key</label>
    <input class="input" type="text" placeholder="sk-..." />
  </div>
  <div>
    <label class="label">Model</label>
    <input class="input" type="text" value="claude-opus-4-5" />
  </div>
  <div>
    <label class="label">API key</label>
    <input class="input" type="text" value="sk-ant-...92fa" style="border-bottom-color: var(--accent); box-shadow: 0 1px 0 0 var(--accent);" />
    <div class="cap" style="margin-top: 6px; color: var(--accent); text-transform: none; letter-spacing: 0; font-size: 12px;">Focused — 1px → 2px accent rule</div>
  </div>
  <div>
    <label class="label">Model temperature</label>
    <input class="input" type="text" value="0.3" disabled style="color: var(--ink-3); border-bottom-color: var(--hairline);" />
  </div>
</div>

</div>
</body>
</html>
