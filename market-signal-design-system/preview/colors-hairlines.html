<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hairlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div class="swatch-row" style="--cols: 2;">
  <div class="swatch">
    <div class="swatch-chip" style="background:#C8BFAE;"></div>
    <div class="swatch-name">--hairline</div>
    <div class="swatch-hex">#C8BFAE · table rules · borders</div>
  </div>
  <div class="swatch">
    <div class="swatch-chip" style="background:#DCD4C0;"></div>
    <div class="swatch-name">--hairline-soft</div>
    <div class="swatch-hex">#DCD4C0 · row separators</div>
  </div>
</div>
<div style="margin-top:18px; border-top: 1px solid #C8BFAE; padding-top: 10px; font-family: var(--font-serif); font-size: 14px; color: var(--ink-2); font-style: italic;">
  Differentiation is hairlines and tone, never shadow.
</div>

</div>
</body>
</html>
