<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Corner radii — barely there</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: flex; gap: 28px; align-items: flex-end;">
  
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 0px; "></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">0px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">ok</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 1px; "></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">1px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">ok</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--ink); border-radius: 2px; "></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">2px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3);">ok</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--paper-edge); border-radius: 4px; border: 1px dashed var(--ink-3);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">4px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #9c6262;">reject</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--paper-edge); border-radius: 8px; border: 1px dashed var(--ink-3);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">8px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #9c6262;">reject</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width: 64px; height: 64px; background: var(--paper-edge); border-radius: 16px; border: 1px dashed var(--ink-3);"></div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--ink-2);">16px</div>
      <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #9c6262;">reject</div>
    </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  1–2px only. Anything ≥ 4px reads consumer-app on sight. Pill capsules are prohibited.
</div>

</div>
</body>
</html>
