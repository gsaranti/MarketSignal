<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tracking posture</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display: grid; grid-template-columns: 1fr; row-gap: 12px;">
  <div>
    <div class="cap">Body · serif · −0.006em</div>
    <div style="font-family: var(--font-serif); font-size: 17px; letter-spacing: -0.006em; color: var(--ink); margin-top: 4px;">Last month's call on energy looks early.</div>
  </div>
  <div>
    <div class="cap">UI · sans · 0</div>
    <div style="font-family: var(--font-sans); font-size: 14px; letter-spacing: 0; color: var(--ink); margin-top: 4px;">Generate this week's issue</div>
  </div>
  <div>
    <div class="cap">Caption · sans · +0.05em</div>
    <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px;">Issue 142 · Sunday morning</div>
  </div>
  <div>
    <div class="cap">Display · serif · 0 (never opened)</div>
    <div style="font-family: var(--font-serif); font-size: 28px; letter-spacing: 0; color: var(--ink); margin-top: 4px; font-weight: 600;">The Energy Re-rating Is Real</div>
  </div>
</div>

</div>
</body>
</html>
