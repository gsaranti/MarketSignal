<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Persistent warning area</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="border-top: 1px solid var(--ink); border-bottom: 1px solid var(--hairline); padding: 10px 0; display:flex; align-items:flex-start; gap: 12px;">
  <div style="font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink); font-weight: 600; white-space: nowrap; padding-top: 2px;">Warning · Issue 142</div>
  <div style="font-family: var(--font-serif); font-size: 15px; line-height: 1.5; color: var(--ink); letter-spacing: -0.006em;">
    Last month's energy call was early. The underlying logic still holds, but the timing was wrong. See the retrospective in §4.
  </div>
</div>
<div class="cap-line" style="margin-top:14px; font-style:italic; color: var(--ink-3);">
  An always-visible row of active caveats. No icon, no color flag. The words are the alert.
</div>

</div>
</body>
</html>
